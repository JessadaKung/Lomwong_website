services:
  postgres:
    image: postgres:16-alpine
    container_name: lomwong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lomwong
      POSTGRES_PASSWORD: lomwong
      POSTGRES_DB: lomwong
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lomwong -d lomwong"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lomwong-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lomwong:lomwong@postgres:5432/lomwong}
    command: sh -c "npx prisma db push && npm run db:seed"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lomwong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lomwong:lomwong@postgres:5432/lomwong}
      PORT: ${PORT:-4000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: lomwong-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      INTERNAL_API_URL: http://backend:4000
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
